name: test-package

on:
  workflow_dispatch:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Create Sentry config file
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          echo sentry_dsn=$SENTRY_DSN > core/utils/build.properties

      - name: Decode keystore
        env:
          ENCODED_STRING: ${{ secrets.KEYSTORE_BASE_64 }}
        run: |
          echo $ENCODED_STRING > keystore-b64.txt
          base64 -d keystore-b64.txt > androidApp/keystore.jks

      - name: Build Debian package
        run: ./gradlew :desktopApp:packageDeb --stacktrace

      - name: Upload release build to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            desktopApp/build/compose/binaries/main/deb/*.deb
