name: release-beta

on:
  push:
    tags:
      - '*.*.*-beta*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Create Sentry config file
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          echo sentry_dsn=$SENTRY_DSN > core/utils/build.properties

      - name: Create Translation API config file
        env:
          TRANSLATION_API_URL: ${{ secrets.INNER_TRANSLATION_API_URL }}
        run: |
          echo inner_translation_api_url=$TRANSLATION_API_URL > core/api/build.properties

      - name: Decode keystore
        env:
          ENCODED_STRING: ${{ secrets.KEYSTORE_BASE_64 }}
        run: |
          echo $ENCODED_STRING > keystore-b64.txt
          base64 -d keystore-b64.txt > androidApp/keystore.jks

      - name: Build Android package
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Build Debian package
        run: ./gradlew :shared:packageDeb --stacktrace

      - name: Upload release build to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            androidApp/build/outputs/apk/release/*.apk
            shared/build/compose/binaries/main/deb/*.deb

      - name: Create Github release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: true
          files: |
            androidApp/build/outputs/apk/release/*.apk
            shared/build/compose/binaries/main/deb/*.deb
